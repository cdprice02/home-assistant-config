# Loads default set of integrations. Do not remove.
default_config:
frontend:
  themes: !include_dir_merge_named themes
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 10.42.0.0/16  # pod CIDR
    - 100.64.0.0/10  # Tailscale CGNAT
lovelace:
  dashboards:
    my-home:
      mode: yaml
      filename: my-home.yaml
      title: Home
      icon: mdi:home
      show_in_sidebar: false
    dashboard-system:
      mode: yaml
      filename: system.yaml
      title: System
      icon: mdi:cog
      show_in_sidebar: true
      require_admin: true

input_boolean:
  skip_next_wakeup:
    name: Skip Next Wakeup
    icon: mdi:alarm-off
  dog_checkin_enabled:
    name: Dog Check-in Alerts
    icon: mdi:dog
  camera_privacy_when_home:
    name: Camera Privacy When Home
    icon: mdi:cctv-off

input_datetime:
  wakeup_time:
    name: Wakeup Time
    has_date: false
    has_time: true
    icon: mdi:alarm
  next_alarm:
    name: Next Alarm Override
    has_date: true
    has_time: true
    icon: mdi:alarm

input_select:
  phone_focus:
    name: Phone Focus
    options:
      - None
      - Do Not Disturb
      - Sleep
      - Fitness
      - Driving
      - Reduce Interruptions
    icon: mdi:cellphone-sound

mqtt:
  sensor:
    - name: "Queen CPU Temperature"
      unique_id: homelab_temp_queen
      state_topic: "homelab/temp/queen"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      expire_after: 30
    - name: "Drone-0 CPU Temperature"
      unique_id: homelab_temp_drone_0
      state_topic: "homelab/temp/drone-0"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      expire_after: 30
