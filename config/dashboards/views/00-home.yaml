title: Home
path: home
icon: mdi:home
type: sections
max_columns: 3
# Status moved to native top-of-view badges (auto-spaced) to fix the crowding.
badges:
  - type: entity
    entity: person.carson
    show_name: true
  - type: entity
    entity: input_select.phone_focus
    icon: mdi:cellphone-sound
  - type: entity
    entity: sensor.fordpass_3fmcr9c65prd22131_outsidetemp
    name: Outside
    icon: mdi:thermometer
  - type: entity
    entity: light.home_lights
    name: Lights
    icon: mdi:lightbulb-group
sections:
  # --- At a glance: weather (Met.no) ---
  - type: grid
    cards:
      - type: heading
        heading: At a glance
        icon: mdi:eye-outline
      - type: weather-forecast
        entity: weather.forecast_home
        show_current: true
        show_forecast: true
        forecast_type: daily

  # --- Rooms (hidden while Sleep focus is active) ---
  - type: grid
    visibility:
      - condition: state
        entity: input_select.phone_focus
        state:
          - "Off"
          - Do Not Disturb
          - Personal
          - Fitness
          - Driving
          - Reduce Interruptions
    cards:
      - type: heading
        heading: Rooms
        icon: mdi:floor-plan
      - type: custom:mushroom-template-card
        primary: Living Room
        secondary: "{{ 'On' if is_state('light.living_room_lights','on') else 'Off' }}"
        icon: mdi:sofa
        icon_color: "{{ 'amber' if is_state('light.living_room_lights','on') else 'grey' }}"
        tap_action:
          action: navigate
          navigation_path: /my-home/living-room
      - type: custom:mushroom-template-card
        primary: Bedroom
        secondary: "{{ 'On' if is_state('light.bedroom_lights','on') else 'Off' }}"
        icon: mdi:bed
        icon_color: "{{ 'amber' if is_state('light.bedroom_lights','on') else 'grey' }}"
        tap_action:
          action: navigate
          navigation_path: /my-home/bedroom
      - type: custom:mushroom-template-card
        primary: Office
        secondary: "{{ 'On' if is_state('light.office_lights','on') else 'Off' }}"
        icon: mdi:chair-rolling
        icon_color: "{{ 'amber' if is_state('light.office_lights','on') else 'grey' }}"
        tap_action:
          action: navigate
          navigation_path: /my-home/office
      - type: custom:mushroom-template-card
        primary: Pet
        secondary: >-
          {{ 'Privacy on' if is_state('switch.pet_camera_privacy_mode','on')
             else ('Motion' if is_state('binary_sensor.pet_camera_person','on') else 'Quiet') }}
        icon: mdi:dog-side
        icon_color: "{{ 'red' if is_state('binary_sensor.pet_camera_person','on') else 'grey' }}"
        tap_action:
          action: navigate
          navigation_path: /my-home/pet

  # --- Now Playing (only when TV/Xbox active, and not during Sleep) ---
  - type: grid
    visibility:
      - condition: state
        entity: input_select.phone_focus
        state:
          - "Off"
          - Do Not Disturb
          - Personal
          - Fitness
          - Driving
          - Reduce Interruptions
      - condition: or
        conditions:
          - condition: state
            entity: media_player.tv
            state:
              - playing
              - paused
              - "on"
          - condition: state
            entity: binary_sensor.offyerrocker762_in_game
            state: "on"
    cards:
      - type: heading
        heading: Now Playing
        icon: mdi:play-circle
      - type: conditional
        conditions:
          - entity: media_player.tv
            state_not: "off"
        card:
          type: custom:mushroom-media-player-card
          entity: media_player.tv
          use_media_info: true
          show_volume_level: false
      - type: conditional
        conditions:
          - entity: binary_sensor.offyerrocker762_in_game
            state: "on"
        card:
          type: custom:mushroom-template-card
          primary: "{{ states('sensor.offyerrocker762_now_playing') }}"
          secondary: Xbox
          picture: "{{ state_attr('image.offyerrocker762_now_playing','entity_picture') }}"
          icon: mdi:microsoft-xbox

  # --- Whole home controls (hidden while Sleep focus is active) ---
  - type: grid
    visibility:
      - condition: state
        entity: input_select.phone_focus
        state:
          - "Off"
          - Do Not Disturb
          - Personal
          - Fitness
          - Driving
          - Reduce Interruptions
    cards:
      - type: heading
        heading: Whole home
        icon: mdi:home-lightbulb
      - type: custom:mushroom-light-card
        entity: light.home_lights
        name: All Lights
        use_light_color: true
        show_brightness_control: true
        show_color_temp_control: true
        collapsible_controls: false
      - type: custom:button-card
        template: state_orbs
        entity: light.home_lights
        variables:
          lights:
            - light.living_room_lamp
            - light.living_room_floor_lamp
            - light.bedroom_lamp
            - light.bedroom_lamp_2
            - light.desk_lamp
      - type: grid
        columns: 4
        square: false
        cards:
          - type: custom:button-card
            template: scene_orb
            name: Natural Light
            variables:
              scene: scene.home_bright
              palette: ["#fff1dd", "#ffe9c9"]
          - type: custom:button-card
            template: scene_orb
            name: Relax
            variables:
              scene: scene.home_relax
              palette: ["#ff9329", "#ffad5c"]
          - type: custom:button-card
            template: scene_orb
            name: Ruby Romance
            variables:
              scene: scene.home_ruby_romance
              palette: ["#b2183a", "#c72c7a"]
          - type: custom:button-card
            template: scene_orb
            name: Nightlight
            variables:
              scene: scene.home_nightlight
              palette: ["#3a3a6a", "#5a4a8a"]

  # --- System health (hidden while Sleep focus is active) ---
  - type: grid
    visibility:
      - condition: state
        entity: input_select.phone_focus
        state:
          - "Off"
          - Do Not Disturb
          - Personal
          - Fitness
          - Driving
          - Reduce Interruptions
    cards:
      - type: heading
        heading: System
        icon: mdi:server
      - type: custom:mushroom-template-card
        primary: Cluster temps
        secondary: >-
          queen {{ states('sensor.queen_cpu_temperature') }}°C ·
          drone-0 {{ states('sensor.drone_0_cpu_temperature') }}°C
        icon: mdi:thermometer
      - type: custom:mushroom-entity-card
        entity: sensor.backup_last_successful_automatic_backup
        name: Last backup
        icon: mdi:backup-restore
      - type: custom:auto-entities
        card:
          type: entities
          title: Unavailable
        filter:
          include:
            - state: unavailable
          exclude:
            - entity_id: "*_update"
        sort:
          method: entity_id
        show_empty: false

  # --- Good night (visible only while Sleep focus is active) ---
  - type: grid
    visibility:
      - condition: state
        entity: input_select.phone_focus
        state: Sleep
    cards:
      - type: heading
        heading: Good night
        icon: mdi:weather-night
      - type: custom:mushroom-entity-card
        entity: input_datetime.wakeup_time
        name: Wake up
        icon: mdi:alarm
      - type: custom:mushroom-entity-card
        entity: input_datetime.next_alarm
        name: Next alarm override
        icon: mdi:alarm-plus
      - type: custom:mushroom-entity-card
        entity: input_boolean.skip_next_wakeup
        name: Skip next wakeup
        icon: mdi:alarm-off
        tap_action:
          action: toggle
      - type: custom:mushroom-entity-card
        entity: binary_sensor.workday
        name: Workday tomorrow
        icon: mdi:calendar-check
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            template: scene_orb
            name: Nightlight
            variables:
              scene: scene.home_nightlight
              palette: ["#3a3a6a", "#5a4a8a"]
          - type: custom:button-card
            name: All Off
            icon: mdi:power
            styles:
              card:
                - border-radius: 16px
                - height: 78px
                - box-shadow: none
                - background: rgba(255,255,255,0.04)
              icon:
                - color: var(--secondary-text-color)
            tap_action:
              action: call-service
              service: light.turn_off
              service_data:
                entity_id: light.home_lights
