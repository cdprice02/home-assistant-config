title: Living Room
path: living-room
icon: mdi:sofa
subview: true
type: sections
max_columns: 2
sections:
  # --- Light control card: Mushroom controls + live color swatch + scene selector ---
  - type: grid
    cards:
      - type: heading
        heading: Lights
        icon: mdi:lightbulb-group
      - type: custom:mushroom-light-card
        entity: light.living_room_lights
        name: Living Room
        icon: mdi:sofa
        use_light_color: true
        show_brightness_control: true
        show_color_temp_control: true
        show_color_control: true
        collapsible_controls: false
      - type: custom:button-card
        template: swatch
        entity: light.living_room_lights
        variables:
          lights:
            - light.living_room_lamp
            - light.living_room_floor_lamp
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:button-card
            template: scene_tile
            name: Bright
            icon: mdi:white-balance-sunny
            variables:
              scene: scene.living_room_bright
              color: "#E8A93B"
          - type: custom:button-card
            template: scene_tile
            name: Relax
            icon: mdi:sofa
            variables:
              scene: scene.living_room_relax
              color: "#C56A2C"
          - type: custom:button-card
            template: scene_tile
            name: Read
            icon: mdi:book-open-variant
            variables:
              scene: scene.living_room_read
              color: "#4E7CB0"
          - type: custom:button-card
            template: scene_tile
            name: Ruby Romance
            icon: mdi:heart
            variables:
              scene: scene.living_room_ruby_romance
              color: "linear-gradient(135deg, #B4163A, #C72C7A)"
          - type: custom:button-card
            template: scene_tile
            name: Night
            icon: mdi:weather-night
            variables:
              scene: scene.living_room_nightlight
              color: "#3A3A6A"
          - type: custom:button-card
            template: scene_tile
            name: Movie
            icon: mdi:movie-open
            variables:
              scene: scene.movie
              color: "#5B2E7A"

  # --- Media card ---
  - type: grid
    cards:
      - type: heading
        heading: Media
        icon: mdi:television
      - type: custom:mushroom-media-player-card
        entity: media_player.tv
        name: Living Room TV
        use_media_info: true
        show_volume_level: true
        media_controls:
          - play_pause_stop
          - previous
          - next
        volume_controls:
          - volume_buttons
          - volume_mute

  # --- Area mini-log ---
  - type: grid
    cards:
      - type: heading
        heading: Activity
        icon: mdi:history
      - type: logbook
        hours_to_show: 12
        entities:
          - light.living_room_lights
          - light.living_room_lamp
          - light.living_room_floor_lamp
          - media_player.tv
