title: Living Room
path: living-room
icon: mdi:sofa
subview: true
type: sections
max_columns: 2
sections:
  # --- Light control: Hue-style card + live orbs + quick scenes + popup ---
  - type: grid
    cards:
      - type: heading
        heading: Lights
        icon: mdi:lightbulb-group
      - type: custom:hue-like-light-card
        entity: light.living_room_lights
        title: Living Room
        icon: mdi:sofa
        scenes:
          - entity: scene.living_room_natural_light
            title: Natural Light
            color: "#fff1dd"
          - entity: scene.living_room_relax
            title: Relax
            color: "#ff9329"
          - entity: scene.living_room_ocean
            title: Ocean
            color: "#1a9eb2"
          - entity: scene.living_room_forest
            title: Forest
            color: "#3a9e3a"
          - entity: scene.living_room_ruby_romance
            title: Ruby Romance
            color: "#c72c7a"
          - entity: scene.living_room_nightlight
            title: Nightlight
            color: "#3A3A6A"
      - type: custom:button-card
        template: state_orbs
        entity: light.living_room_lights
        variables:
          lights:
            - light.living_room_lamp
            - light.living_room_floor_lamp
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:button-card
            template: scene_orb
            name: Natural Light
            variables:
              scene: scene.living_room_natural_light
              palette: ["#fff1dd", "#ffe9c9"]
          - type: custom:button-card
            name: "Off"
            icon: mdi:power
            styles:
              card:
                - border-radius: 16px
                - height: 78px
                - box-shadow: none
                - background: rgba(255,255,255,0.04)
              icon:
                - color: var(--secondary-text-color)
            tap_action:
              action: call-service
              service: light.turn_off
              service_data:
                entity_id: light.living_room_lights
          - type: custom:button-card
            name: More scenes
            icon: mdi:dots-horizontal-circle-outline
            styles:
              card:
                - border-radius: 16px
                - height: 78px
                - box-shadow: none
                - background: rgba(255,255,255,0.04)
              icon:
                - color: var(--primary-color)
            tap_action:
              action: navigate
              navigation_path: "#lr-scenes"
      # Bubble Card pop-up holding the full palette (opened by "More scenes")
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#lr-scenes"
            name: Living Room Scenes
            icon: mdi:palette
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                template: scene_orb
                name: Natural Light
                variables:
                  scene: scene.living_room_natural_light
                  palette: ["#fff1dd", "#ffe9c9"]
              - type: custom:button-card
                template: scene_orb
                name: Relax
                variables:
                  scene: scene.living_room_relax
                  palette: ["#ff9329", "#ffad5c"]
              - type: custom:button-card
                template: scene_orb
                name: Ocean
                variables:
                  scene: scene.living_room_ocean
                  palette: ["#104eb4", "#1a9eb2"]
              - type: custom:button-card
                template: scene_orb
                name: Forest
                variables:
                  scene: scene.living_room_forest
                  palette: ["#228b22", "#78aa3c"]
              - type: custom:button-card
                template: scene_orb
                name: Ruby Romance
                variables:
                  scene: scene.living_room_ruby_romance
                  palette: ["#b2183a", "#c72c7a"]
              - type: custom:button-card
                template: scene_orb
                name: Nightlight
                variables:
                  scene: scene.living_room_nightlight
                  palette: ["#3a3a6a", "#5a4a8a"]

  # --- Media card ---
  - type: grid
    cards:
      - type: heading
        heading: Media
        icon: mdi:television
      - type: custom:mushroom-media-player-card
        entity: media_player.tv
        name: Living Room TV
        use_media_info: true
        show_volume_level: true
        media_controls:
          - play_pause_stop
          - previous
          - next
        volume_controls:
          - volume_buttons
          - volume_mute

  # --- Area mini-log ---
  - type: grid
    cards:
      - type: heading
        heading: Activity
        icon: mdi:history
      - type: logbook
        hours_to_show: 12
        entities:
          - light.living_room_lights
          - light.living_room_lamp
          - light.living_room_floor_lamp
          - media_player.tv
