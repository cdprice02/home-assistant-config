title: Bedroom
path: bedroom
icon: mdi:bed
subview: true
type: sections
max_columns: 2
sections:
  # --- Light control card: controls + live multi-bulb swatch + scenes ---
  - type: grid
    cards:
      - type: heading
        heading: Lights
        icon: mdi:lightbulb-group
      - type: custom:mushroom-light-card
        entity: light.bedroom_lights
        name: Bedroom
        icon: mdi:bed
        use_light_color: true
        show_brightness_control: true
        show_color_temp_control: true
        show_color_control: true
        collapsible_controls: false
      - type: custom:button-card
        template: swatch
        entity: light.bedroom_lights
        variables:
          lights:
            - light.bedroom_lamp
            - light.bedroom_lamp_2
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:button-card
            template: scene_tile
            name: Bright
            icon: mdi:white-balance-sunny
            variables:
              scene: scene.bedroom_bright
              color: "#E8A93B"
          - type: custom:button-card
            template: scene_tile
            name: Relax
            icon: mdi:bed
            variables:
              scene: scene.bedroom_relax
              color: "#C56A2C"
          - type: custom:button-card
            template: scene_tile
            name: Read
            icon: mdi:book-open-variant
            variables:
              scene: scene.bedroom_read
              color: "#4E7CB0"
          - type: custom:button-card
            template: scene_tile
            name: Ruby Romance
            icon: mdi:heart
            variables:
              scene: scene.bedroom_ruby_romance
              color: "linear-gradient(135deg, #B4163A, #C72C7A)"
          - type: custom:button-card
            template: scene_tile
            name: Wind Down
            icon: mdi:weather-night
            variables:
              scene: scene.bedroom_wind_down
              color: "#3A3A6A"

  # --- Area mini-log ---
  - type: grid
    cards:
      - type: heading
        heading: Activity
        icon: mdi:history
      - type: logbook
        hours_to_show: 12
        entities:
          - light.bedroom_lights
          - light.bedroom_lamp
          - light.bedroom_lamp_2
